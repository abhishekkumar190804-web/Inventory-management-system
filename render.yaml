services:
  - type: web
    name: inventrack-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventrack-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://inventorymanagementsystem-lake.vercel.app

databases:
  - name: inventrack-db
    databaseName: inventrack
    user: inventrack
